name: Envelo
options:
  bundleIdPrefix: com.shimondeitel.envelo
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Envelo:
    type: application
    platform: iOS
    sources:
      - path: Envelo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.envelo
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Envelo/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  EnveloTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: EnveloTests
      - path: Envelo.storekit
    dependencies:
      - target: Envelo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.envelo.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  EnveloUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: EnveloUITests
    dependencies:
      - target: Envelo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.envelo.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Envelo:
    build:
      targets:
        Envelo: all
        EnveloTests: [test]
        EnveloUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Envelo.storekit
    test:
      config: Debug
      storeKitConfiguration: Envelo.storekit
      targets:
        - EnveloTests
        - EnveloUITests
    archive:
      config: Release
